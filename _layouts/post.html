---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.tags.size > 0 %}
    <footer class="post-tags" aria-label="Tags">
      {% for tag in page.tags %}<span>{{ tag }}</span>{% endfor %}
    </footer>
  {% endif %}
</article>
